<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Records — Recording Archive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">

    <div class="brand">
      <!-- Logo: network nodes -->
      <svg class="brand-logo-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36" aria-hidden="true">
        <!-- edges -->
        <line x1="18" y1="6"  x2="6"  y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <line x1="18" y1="6"  x2="30" y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <line x1="6"  y1="24" x2="30" y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <line x1="18" y1="6"  x2="18" y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
        <line x1="6"  y1="24" x2="18" y2="16" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
        <line x1="30" y1="24" x2="18" y2="16" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
        <!-- inner node -->
        <circle cx="18" cy="16" r="2.5" fill="var(--accent)" opacity="0.6"/>
        <!-- outer nodes -->
        <circle cx="18" cy="6"  r="3.5" fill="var(--accent)"/>
        <circle cx="6"  cy="24" r="3.5" fill="var(--accent)"/>
        <circle cx="30" cy="24" r="3.5" fill="var(--accent)"/>
        <!-- center dot on outer nodes -->
        <circle cx="18" cy="6"  r="1.5" fill="var(--surface)"/>
        <circle cx="6"  cy="24" r="1.5" fill="var(--surface)"/>
        <circle cx="30" cy="24" r="1.5" fill="var(--surface)"/>
      </svg>
      <div class="brand-text">
        <span class="brand-name">PC Records</span>
        <span class="brand-sub">Recording Archive</span>
      </div>
    </div>

    <div class="topbar-right">
      <div class="rec-badge">
        <span class="rec-dot"></span>
       RECORDING
      </div>
      <span class="clock" id="clock">--:--:--</span>
      <span class="topbar-user" id="topbarUser"></span>
      <a href="/users.html" class="theme-toggle" id="usersLink" title="Manage users" style="display:none;text-decoration:none">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"/></svg>
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
        <svg id="icon-moon" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
        </svg>
        <svg id="icon-sun" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="16" height="16" style="display:none">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.706a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
        </svg>
      </button>
      <button class="logout-btn" id="logoutBtn" aria-label="Sign out" title="Sign out">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M13 3h4a1 1 0 011 1v12a1 1 0 01-1 1h-4"/><polyline points="10 15 14 10 10 5"/><line x1="14" y1="10" x2="3" y2="10"/></svg>
      </button>
    </div>

  </div>
</header>

<!-- Storage bar -->
<div class="storage-bar" id="storageBar" style="display:none">
  <div class="storage-inner">
    <div class="storage-left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0018 0V5"/><path d="M3 12a9 3 0 0018 0"/></svg>
      <span class="storage-label">Disk</span>
      <span class="storage-used" id="storageUsed">—</span>
      <span class="storage-sep">of</span>
      <span class="storage-total" id="storageTotal">—</span>
      <span class="storage-avail" id="storageAvail"></span>
    </div>
    <div class="storage-track">
      <div class="storage-fill" id="storageFill" style="width:0%"></div>
    </div>
    <span class="storage-pct" id="storagePct">—</span>
  </div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">Table Game</span>
    <select id="station-select" aria-label="Select station"></select>
    <span class="table-badge" id="table-badge">BAC01</span>
    <span class="file-count" id="station-count" style="display:none"></span>
  </div>

  <div class="ctrl-group">
    <span class="refresh-indicator" id="refreshIndicator" title="Auto-refresh every 15s">
      <span class="refresh-dot" id="refreshDot"></span>
      <span class="refresh-label" id="refreshLabel">15s</span>
    </span>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Date</span>
    <select id="date-select">
      <option value="">All dates</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Show</span>
    <select id="page-size-select">
      <option value="10">10</option>
      <option value="20" selected>20</option>
      <option value="30">30</option>
      <option value="all">All</option>
    </select>
  </div>

  <div class="ctrl-spacer"></div>

  <div class="ctrl-group">
    <label for="search-input" class="sr-only">Search filenames</label>
    <input type="search" id="search-input" placeholder="Search filenames…">
  </div>

  <div class="ctrl-group" id="bulkDeleteGroup" style="display:none">
    <button class="pager-btn" id="deleteByDateBtn" style="border-color:var(--rec);color:var(--rec)" disabled>Delete by date</button>
    <button class="pager-btn" id="deleteAllBtn" style="border-color:var(--rec);color:var(--rec)">Delete all</button>
  </div>
</div>

<main>
  <table class="tape-table">
    <thead>
      <tr>
        <th class="col-name">Filename</th>
        <th class="col-size">Format</th>
        <th class="col-filesize">Size</th>
        <th class="col-duration">Duration</th>
        <th class="col-time">Date</th>
        <th class="col-play" aria-label="Play"></th>
        <th class="col-del" id="col-del-header"></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <div class="pager">
    <button class="pager-btn" id="prev-page" aria-label="Previous page">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M10 12L6 8l4-4"/></svg>
      Prev
    </button>
    <span class="pager-info" id="pager-info">Page 1 of 1</span>
    <button class="pager-btn" id="next-page" aria-label="Next page">
      Next
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M6 4l4 4-4 4"/></svg>
    </button>
  </div>
</main>

<footer class="footer">
  <span>Developed by <span class="footer-name">Kim Lay</span></span>
</footer>

<!-- Player overlay -->
<div class="player-overlay" id="playerOverlay" role="dialog" aria-modal="true" aria-label="Video player">
  <div class="player-frame">
    <div class="player-head">
      <span class="player-title" id="playerTitle">—</span>
      <button class="close-btn" id="closePlayer" aria-label="Close player">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg" width="14" height="14"><path d="M1 1l12 12M13 1L1 13"/></svg>
      </button>
    </div>
    <video id="playerVideo" controls></video>
  </div>
</div>

<script>
  const html = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const moon = document.getElementById('icon-moon');
  const sun = document.getElementById('icon-sun');
  const saved = localStorage.getItem('theme') || 'dark';
  html.dataset.theme = saved;
  if (saved === 'light') { moon.style.display = 'none'; sun.style.display = ''; }
  btn.addEventListener('click', () => {
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem('theme', next);
    moon.style.display = next === 'dark' ? '' : 'none';
    sun.style.display = next === 'light' ? '' : 'none';
  });

  // Session check — redirect to login if not authenticated
  fetch('/api/auth/me').then(r => {
    if (!r.ok) { window.location.href = '/login.html'; return; }
    return r.json();
  }).then(data => {
    if (data) {
      document.getElementById('topbarUser').textContent = data.username;
      window.__userRole = data.role;          // expose for script.js
      if (data.role === 'admin') {
        document.getElementById('usersLink').style.display = '';
        document.getElementById('bulkDeleteGroup').style.display = '';
      }
    }
  }).catch(() => { window.location.href = '/login.html'; });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login.html';
  });
</script>
<!-- Delete file confirm modal -->
<div class="player-overlay" id="deleteFileModal" role="dialog" aria-modal="true">
  <div class="player-frame" style="max-width:420px">
    <div class="player-head">
      <span style="font-family:var(--mono);font-size:13px;color:var(--rec)">⚠ Delete Recording</span>
      <button class="close-btn" id="cancelDeleteFile" aria-label="Cancel">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14"><path d="M1 1l12 12M13 1L1 13"/></svg>
      </button>
    </div>
    <div style="padding:20px 20px 6px">
      <p style="font-size:13px;color:var(--text-dim);line-height:1.7">
        Are you sure you want to permanently delete:<br>
        <strong id="delFileName" style="color:var(--text);font-family:var(--mono);font-size:12px;word-break:break-all"></strong>
      </p>
      <p style="font-size:12px;color:var(--rec);margin-top:10px;font-family:var(--mono)">This cannot be undone.</p>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--border)">
      <button class="pager-btn" id="cancelDeleteFile2" style="border-color:var(--border)">Cancel</button>
      <button class="pager-btn" id="confirmDeleteFile" style="border-color:var(--rec);color:var(--rec)">Delete</button>
    </div>
  </div>
</div>

<!-- Bulk delete confirm modal -->
<div class="player-overlay" id="bulkDeleteModal" role="dialog" aria-modal="true">
  <div class="player-frame" style="max-width:420px">
    <div class="player-head">
      <span style="font-family:var(--mono);font-size:13px;color:var(--rec)">⚠ Bulk Delete</span>
      <button class="close-btn" id="cancelBulkDelete" aria-label="Cancel">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14"><path d="M1 1l12 12M13 1L1 13"/></svg>
      </button>
    </div>
    <div style="padding:20px 20px 6px">
      <p id="bulkDeleteMessage" style="font-size:13px;color:var(--text-dim);line-height:1.7"></p>
      <p style="font-size:12px;color:var(--rec);margin-top:10px;font-family:var(--mono)">This cannot be undone.</p>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--border)">
      <button class="pager-btn" id="cancelBulkDelete2" style="border-color:var(--border)">Cancel</button>
      <button class="pager-btn" id="confirmBulkDelete" style="border-color:var(--rec);color:var(--rec)">Delete</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
