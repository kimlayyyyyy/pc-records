<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PC Records</title>
<link rel="stylesheet" href="style.css">
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .login-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .login-brand-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .login-brand-sub {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .login-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    height: 42px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 0 14px;
    transition: border-color .15s;
    appearance: none;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field input::placeholder { color: var(--text-muted); }
  .login-btn {
    width: 100%;
    height: 42px;
    margin-top: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    letter-spacing: 0.01em;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-btn:active { opacity: 0.75; }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error {
    display: none;
    background: var(--rec-dim);
    border: 1px solid rgba(240,82,82,0.3);
    border-radius: var(--radius);
    color: var(--rec);
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-family: var(--mono);
  }
  .login-error.show { display: block; }
  .login-footer {
    text-align: center;
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .login-footer span { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
        <line x1="18" y1="6"  x2="6"  y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <line x1="18" y1="6"  x2="30" y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <line x1="6"  y1="24" x2="30" y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
        <line x1="18" y1="6"  x2="18" y2="24" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
        <line x1="6"  y1="24" x2="18" y2="16" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
        <line x1="30" y1="24" x2="18" y2="16" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
        <circle cx="18" cy="16" r="2.5" fill="var(--accent)" opacity="0.6"/>
        <circle cx="18" cy="6"  r="3.5" fill="var(--accent)"/>
        <circle cx="6"  cy="24" r="3.5" fill="var(--accent)"/>
        <circle cx="30" cy="24" r="3.5" fill="var(--accent)"/>
        <circle cx="18" cy="6"  r="1.5" fill="var(--surface)"/>
        <circle cx="6"  cy="24" r="1.5" fill="var(--surface)"/>
        <circle cx="30" cy="24" r="1.5" fill="var(--surface)"/>
      </svg>
      <div>
        <div class="login-brand-name">PC Records</div>
        <div class="login-brand-sub">Recording Archive</div>
      </div>
    </div>

    <div class="login-title">Sign in</div>
    <div class="login-sub">Enter your credentials to access recordings.</div>

    <div class="login-error" id="loginError">Invalid username or password.</div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn">Sign in</button>

    <div class="login-footer">Developed by <span>Kim Lay</span></div>
  </div>
</div>

<script>
  // Theme
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.dataset.theme = saved;

  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('loginError');
  const uEl   = document.getElementById('username');
  const pEl   = document.getElementById('password');

  async function doLogin() {
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: uEl.value.trim(), password: pEl.value })
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        err.classList.add('show');
        pEl.value = '';
        pEl.focus();
      }
    } catch (e) {
      err.textContent = 'Connection error. Please try again.';
      err.classList.add('show');
    }
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }

  btn.addEventListener('click', doLogin);
  [uEl, pEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
</script>
</body>
</html>
