server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    absolute_redirect off;

    # ── Public routes (no auth needed) ──────────────────────
    location = /login.html { try_files $uri =404; }
    location = /style.css  { try_files $uri =404; }
    # ── Auth API — proxy to Node service ────────────────────
    location /api/auth/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Cookie $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    # ── Files API (delete + list) — proxy to Node service ──────
    location /api/files {
        proxy_pass         http://127.0.0.1:3000/files;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Cookie $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    location /api/list/ {
        proxy_pass         http://127.0.0.1:3000/list/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Cookie $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    location /api/duration/ {
        proxy_pass         http://127.0.0.1:3000/duration/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Cookie $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    # ── Storage stats API via CGI ────────────────────────────
    location /api/storage {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /usr/local/bin/storage.sh;
    }

    # ── Protected: validate session before serving ───────────
    location / {
        auth_request     /auth-check;
        error_page 401 = @login_redirect;
        try_files $uri $uri/ /index.html;
    }

    # Video directories — also protected
    location /videos/ {
        auth_request /auth-check;
        error_page 401 = @login_redirect;
        autoindex on;
        autoindex_format html;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Accept-Ranges bytes;
    }

    # Internal subrequest to check session
    location = /auth-check {
        internal;
        proxy_pass              http://127.0.0.1:3000/me;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
        proxy_set_header        X-Original-URI $request_uri;
    }

    # Redirect unauthenticated users to login page
    location @login_redirect {
        return 302 /login.html;
    }

    client_max_body_size 0;
}
